name: windnav-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    runs-on: opensuse-${{ matrix.arch }}
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3
        with: 
          driver: docker
          # buildkitd-config-inline: |
          #   [registry."docker.io"]
          #     mirrors = ["https://docker.1ms.run"]

      - name: Set up Docker metadata
        id: meta
        uses: actions/metadata-action@v5
        with:
          images: |
            ${{ vars.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Log in to registry
        uses: actions/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: actions/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          pull: false
          outputs: type=image,name=${{ vars.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "Resolved digest: $digest"
          if [ -z "$digest" ]; then
            echo "::error::Digest output is empty, cannot upload."
            exit 1
          fi
          # 去掉 sha256: 前缀，用哈希值作为文件名
          touch "/tmp/digests/${digest#sha256:}"
          ls -la /tmp/digests/

      - name: Upload digest
        uses: actions/upload-artifact@v3   
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: opensuse-aarch64
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Log in to registry
        uses: actions/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3
        with:
          driver: docker

      - name: Set up Docker metadata
        id: meta
        uses: actions/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Download digests
        uses: actions/download-artifact@v3
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        run: |
          set -e
          tag_args=()
          while IFS= read -r t; do
            tag_args+=("-t" "$t")
          done <<< "${{ steps.meta.outputs.tags }}"
          sources=()
          for f in /tmp/digests/*; do
            sources+=("${{ vars.REGISTRY_IMAGE }}@sha256:$(basename "$f")")
          done
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ vars.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}"
