name: windnav-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    runs-on: opensuse-${{ matrix.arch }}
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Compute image metadata
        id: meta
        run: |
          set -e
          # 解析 semver: v1.2.3 → 1.2.3 / 1.2 / 1
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$VERSION"
          # 兜底：纯数字 tag (如 v1) 时 MINOR/PATCH 为空
          MINOR="${MINOR:-0}"

          IMAGE="${{ vars.REGISTRY_IMAGE }}"
          TAG="${IMAGE}:${VERSION}-${{ matrix.arch }}"

          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image:  ${IMAGE}"
          echo "Tag:    ${TAG}"

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ vars.REGISTRY_HOST }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

      - name: Build, push & export digest
        id: build
        run: |
          set -e
          METADATA_FILE=$(mktemp)

          docker buildx build \
            -t "${{ steps.meta.outputs.tag }}" \
            --platform "${{ matrix.platform }}" \
            --file deploy/Dockerfile \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --provenance=false \
            --metadata-file "$METADATA_FILE" \
            --push \
            .

          # 从 metadata 文件提取 digest
          DIGEST=$(jq -r '.["containerimage.digest"]' "$METADATA_FILE")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: ${DIGEST}"

          # 写入 artifact 目录
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
          ls -la /tmp/digests/

      - name: Upload digest
        uses: actions/upload-artifact@v3
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: opensuse-aarch64
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock
    steps:
      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Compute release tags
        id: meta
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$VERSION"
          MINOR="${MINOR:-0}"

          IMAGE="${{ vars.REGISTRY_IMAGE }}"

          printf '%s\n' \
            "${IMAGE}:${VERSION}" \
            "${IMAGE}:${MAJOR}.${MINOR}" \
            "${IMAGE}:${MAJOR}" \
            "${IMAGE}:latest" \
            > /tmp/release-tags.txt

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          cat /tmp/release-tags.txt

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ vars.REGISTRY_HOST }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

      - name: Download digests
        uses: actions/download-artifact@v3
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        run: |
          set -e
          IMAGE="${{ vars.REGISTRY_IMAGE }}"

          SOURCES=()
          for f in /tmp/digests/*; do
            SOURCES+=("${IMAGE}@sha256:$(basename "$f")")
          done
          echo "Sources (${#SOURCES[@]}): ${SOURCES[*]}"

          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: ${TAG}"
            docker buildx imagetools create -t "${TAG}" "${SOURCES[@]}"
          done < /tmp/release-tags.txt

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ vars.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}"
