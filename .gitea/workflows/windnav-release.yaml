name: windnav-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    runs-on: opensuse-${{ matrix.arch }}
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Compute image metadata
        id: meta
        run: |
          set -e
          # 解析 semver: v1.2.3 → 1.2.3 / 1.2 / 1
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$VERSION"
          # 兜底：纯数字 tag (如 v1) 时 MINOR/PATCH 为空
          MINOR="${MINOR:-0}"

          IMAGE="${{ vars.REGISTRY_IMAGE }}"
          TAG="${IMAGE}:${VERSION}-${{ matrix.arch }}"

          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Image:  ${IMAGE}"
          echo "Tag:    ${TAG}"

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ vars.REGISTRY_HOST }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

      - name: Build and push image
        id: build
        run: |
          set -e

          docker buildx build \
            -t "${{ steps.meta.outputs.tag }}" \
            --platform "${{ matrix.platform }}" \
            --file deploy/Dockerfile \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.version }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --provenance=false \
            --push \
            .

          echo "Pushed: ${{ steps.meta.outputs.tag }}"

      - name: Clean up local image
        if: always()
        run: |
          docker rmi "${{ steps.meta.outputs.tag }}" || true
          docker builder prune --force || true

  merge:
    needs: build
    runs-on: opensuse-aarch64
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock
    steps:
      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Compute release tags
        id: meta
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR _ <<< "$VERSION"
          MINOR="${MINOR:-0}"

          IMAGE="${{ vars.REGISTRY_IMAGE }}"

          printf '%s\n' \
            "${IMAGE}:${VERSION}" \
            "${IMAGE}:${MAJOR}.${MINOR}" \
            "${IMAGE}:${MAJOR}" \
            "${IMAGE}:latest" \
            > /tmp/release-tags.txt

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          cat /tmp/release-tags.txt

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ vars.REGISTRY_HOST }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

      - name: Create manifest list and push
        run: |
          set -e
          IMAGE="${{ vars.REGISTRY_IMAGE }}"
          VERSION="${{ steps.meta.outputs.version }}"

          # 通过 inspect 已推送的架构镜像获取 digest
          ARCHS=("x86_64" "aarch64")
          SOURCES=()
          for ARCH in "${ARCHS[@]}"; do
            ARCH_TAG="${IMAGE}:${VERSION}-${ARCH}"
            echo "Inspecting: ${ARCH_TAG}"
            DIGEST=$(docker buildx imagetools inspect "${ARCH_TAG}" | grep '^Digest:' | awk '{print $2}')
            echo "  Digest: ${DIGEST}"
            SOURCES+=("${IMAGE}@${DIGEST}")
          done
          echo "Sources (${#SOURCES[@]}): ${SOURCES[*]}"

          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: ${TAG}"
            docker buildx imagetools create -t "${TAG}" "${SOURCES[@]}"
          done < /tmp/release-tags.txt

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ vars.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}"
