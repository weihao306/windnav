name: windnav-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    runs-on: opensuse-${{ matrix.arch }}
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Compute image tags & labels
        id: meta
        run: |
          set -e
          # 解析 tag: v1.2.3 → version=1.2.3, major=1, minor=2
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          IMAGE="${{ vars.REGISTRY_IMAGE }}"

          # 生成标签 (含 arch 后缀避免多架构冲突)
          echo "tags=${IMAGE}:${VERSION}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # 生成 OCI 标签
          LABELS="org.opencontainers.image.version=${VERSION}"
          LABELS="${LABELS},org.opencontainers.image.revision=${{ github.sha }}"
          LABELS="${LABELS},org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "labels=${LABELS}" >> "$GITHUB_OUTPUT"

          echo "Image:  ${IMAGE}"
          echo "Tag:    ${IMAGE}:${VERSION}-${{ matrix.arch }}"

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ vars.REGISTRY_HOST }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

      - name: Build and push
        id: build
        run: |
          set -e

          # 将逗号分隔的 labels 转为多个 --label 参数
          IFS=',' read -ra LABEL_ARR <<< "${{ steps.meta.outputs.labels }}"
          LABEL_FLAGS=()
          for lbl in "${LABEL_ARR[@]}"; do
            LABEL_FLAGS+=("--label" "$lbl")
          done

          docker buildx build \
            -t "${{ steps.meta.outputs.tags }}" \
            --platform "${{ matrix.platform }}" \
            --file deploy/Dockerfile \
            "${LABEL_FLAGS[@]}" \
            --provenance=false \
            --push \
            .

          # 从本地镜像仓库中提取推送后的 digest
          DIGEST=$(docker image inspect "${{ steps.meta.outputs.tags }}" \
            --format='{{index .RepoDigests 0}}' \
            | sed 's/.*@//')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: ${DIGEST}"

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "::error::Digest output is empty, cannot upload."
            exit 1
          fi
          touch "/tmp/digests/${digest#sha256:}"
          ls -la /tmp/digests/

      - name: Upload digest
        uses: actions/upload-artifact@v3
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: opensuse-aarch64
    container:
      image: opensuse/tumbleweed:basic
      volumes:
        - /run/docker.sock:/var/run/docker.sock
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          zypper --non-interactive refresh
          zypper --non-interactive install -y docker

      - name: Compute release tags
        id: meta
        run: |
          set -e
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          IMAGE="${{ vars.REGISTRY_IMAGE }}"

          # 按行输出所有标签（供后续循环读取）
          printf '%s\n' \
            "${IMAGE}:${VERSION}" \
            "${IMAGE}:${MAJOR}.${MINOR}" \
            "${IMAGE}:${MAJOR}" \
            "${IMAGE}:latest" \
            > /tmp/release-tags.txt

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          cat /tmp/release-tags.txt

      - name: Log in to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" \
            | docker login "${{ vars.REGISTRY_HOST }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

      - name: Download digests
        uses: actions/download-artifact@v3
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list and push
        run: |
          set -e
          IMAGE="${{ vars.REGISTRY_IMAGE }}"

          # 收集各架构的 digest 引用
          SOURCES=()
          for f in /tmp/digests/*; do
            SOURCES+=("${IMAGE}@sha256:$(basename "$f")")
          done
          echo "Sources: ${SOURCES[*]}"

          # 为每个标签创建并推送多架构 manifest
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Creating manifest: ${TAG}"
            docker buildx imagetools create -t "${TAG}" "${SOURCES[@]}"
          done < /tmp/release-tags.txt

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ vars.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}"
