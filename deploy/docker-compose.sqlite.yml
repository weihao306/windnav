services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DB_DRIVER: sqlite
      DB_SQLITE_PATH: /app/data/windnav.db
      JWT_SECRET: replace-with-a-long-random-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-this-password
    ports:
      - "80:80"
    volumes:
      - windnav_data:/app/data

volumes:
  windnav_data:
